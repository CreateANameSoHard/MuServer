<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muduo HTTP Server 静态文件测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
            padding-left: 20px;
        }
        .info {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-family: monospace;
        }
        .status {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        footer {
            margin-top: 30px;
            text-align: center;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">✅ 静态文件服务正常工作</div>
        <h1>Muduo HTTP Server</h1>
        <p>恭喜！你的 HTTP 服务器已经成功发送了这个静态 HTML 文件。</p>
        
        <div class="info">
            <strong>📄 文件信息</strong><br>
            文件名: test.html<br>
            大小: ~2KB<br>
            类型: text/html<br>
            发送方式: sendfile (零拷贝)
        </div>

        <p>如果下面能看到图片，说明图片文件也发送成功：</p>
        <!-- 请确保服务器上有 logo.png 文件，或者替换为任意存在的图片路径 -->
        <img src="https://www.baidu.com/img/flexible/logo/pc/result.png" alt="测试图片" onerror="this.style.display='none'; document.getElementById('imgMsg').style.display='block';">
        <div id="imgMsg" style="display:none; color: #999; margin-top: 10px;">
            ⚠️ 未找到图片文件 (logo.png)，请将任意图片命名为 logo.png 放在同一目录下测试。
        </div>

        <button onclick="fetch('/api/test')">测试 AJAX 请求</button>
        <p id="ajaxResult" style="margin-top: 15px; color: #667eea;"></p>

        <footer>
            Powered by TinyMuduo & sendfile | 当前时间: <span id="time"></span>
        </footer>
    </div>

    <script>
        // 显示当前时间
        document.getElementById('time').innerText = new Date().toLocaleString();

        // 测试 AJAX 请求（如果你的服务器支持动态路由 /api/test，可以返回 JSON）
        document.querySelector('button').addEventListener('click', async function() {
            try {
                const response = await fetch('/api/test');
                const text = await response.text();
                document.getElementById('ajaxResult').innerText = '响应: ' + text;
            } catch (err) {
                document.getElementById('ajaxResult').innerText = '请求失败: ' + err.message;
            }
        });
    </script>
</body>
</html>
